telegram:
    token: "BOT_TOKEN_DARI_BOTFATHER"

# Cloudflare accounts (bisa lebih dari satu)
cloudflare:
    - name: "default"
      email: "email@example.com"
      api_key: "GLOBAL_API_KEY_CLOUDFLARE"
    - name: "akun2"
      email: "akun2@example.com"
      api_key: "GLOBAL_API_KEY_CLOUDFLARE_2"

# Chat ID grup/channel yang diizinkan menggunakan bot
allowed_chat_id: -1001234567890

domains:
    - name: "toko.com"
      label: "STORE"
      zone_id: "ZONE_ID"
      type: "redirect_rules"
      ruleset_id: "RULESET_ID"
      rule_id: "RULE_ID"
      cf_account: "default"
    - name: "promo.com"
      label: "PROMO"
      zone_id: "ZONE_ID"
      type: "redirect_rules"
      ruleset_id: "RULESET_ID"
      rule_id: "RULE_ID"
      cf_account: "default"
    - name: "utama.com"
      label: "MAIN"
      zone_id: "ZONE_ID"
      type: "redirect_rules"
      ruleset_id: "RULESET_ID"
      rule_id: "RULE_ID"
      cf_account: "akun2"
    - name: "blog.com"
      label: "BLOG"
      zone_id: "ZONE_ID"
      type: "page_rules"
      rule_id: "RULE_ID"
      cf_account: "akun2"
